[project]
name = "ontology-resolver"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { email = "konstantin.ketterer@student.hpi.de" }
]
requires-python = ">=3.12"
dependencies = [
    "async-http-client",
    "pronto>=2.7.1",
]

[project.scripts]
ontology-resolver = "ontology_resolver:main"

[build-system]
requires = ["uv_build>=0.8.19,<0.9.0"]
build-backend = "uv_build"

[tool.uv.sources]
async-http-client = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8.4.2",
    "pytest-cov>=7.0.0",
]
