services:
  db:
    image: postgres:18
    container_name: usigrabber_db
    restart: "unless-stopped"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-usigrabber}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - usigrabber_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  usigrabber_pgdata:
